name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Omit registry-url: setup-node would write a temp .npmrc with _authToken; an empty/invalid
      # token blocks OIDC trusted publishing (E404 / ENEEDAUTH). Public deps use the default registry.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25.x

      - name: Upgrade npm to latest (for OIDC support)
        run: |
          npm install -g npm@latest
          npm --version

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: true

      - name: Lint & build
        run: pnpm i -g eslint && pnpm lint && pnpm run build

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          commit: 'chore(release): release packages'
          title: 'chore(release): release packages'
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
